<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workout</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="data/exercise-notes.js" defer></script>
    <script src="data/training-data.js" defer></script>
    <script src="data/current-plan.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 class="site-title">Workout</h1>
        </div>
      </header>

      <nav class="tabs" aria-label="Pages">
        <button class="tab is-active" type="button" data-view="library">Library</button>
        <button class="tab" type="button" data-view="plan">Plan</button>
        <button class="tab" type="button" data-view="calendar">Calendar</button>
        <button class="tab" type="button" data-view="history">History</button>
      </nav>

      <section class="view is-active" id="libraryView">
        <section class="selectors" aria-label="Directory filters">
          <label>
            Category
            <select id="levelOneSelect">
              <option value="">All categories</option>
            </select>
          </label>
          <label>
            Exercise
            <select id="levelTwoSelect" disabled>
              <option value="">Select a category first</option>
            </select>
          </label>
          <button id="resetLibrary" class="plain-button" type="button">Reset</button>
        </section>

        <div class="library-layout">
          <aside class="directory-panel" aria-label="Directory">
            <div class="panel-heading">
              <h2>Directory</h2>
              <span id="directoryMeta">All</span>
            </div>
            <div id="directoryList" class="directory-list"></div>
          </aside>

          <article class="reader-panel" id="readerPanel"></article>
        </div>
      </section>

      <section class="view" id="planView">
        <article class="panel plan-document">
          <div class="note-content" id="planDocument"></div>
        </article>
      </section>

      <section class="view" id="calendarView">
        <section class="stats-grid calendar-stats" aria-label="Training contribution summary">
          <article class="stat-tile">
            <span>Contributions</span>
            <strong id="calendarTotal">0</strong>
          </article>
          <article class="stat-tile">
            <span>Active days</span>
            <strong id="calendarActiveDays">0</strong>
          </article>
          <article class="stat-tile">
            <span>Best day</span>
            <strong id="calendarBestCount">0</strong>
          </article>
          <article class="stat-tile">
            <span>Longest streak</span>
            <strong id="calendarLongestStreak">0</strong>
          </article>
        </section>

        <div class="calendar-years" id="calendarYears"></div>
      </section>

      <section class="view" id="historyView">
        <section class="history-toolbar" aria-label="Filters">
          <label>
            Start date
            <input id="startDate" type="date" />
          </label>
          <label>
            End date
            <input id="endDate" type="date" />
          </label>
          <label>
            Body part
            <select id="bodyPart">
              <option value="">All</option>
            </select>
          </label>
          <label>
            Exercise
            <input id="exerciseSearch" type="search" list="exerciseOptions" placeholder="Search exercises" />
            <datalist id="exerciseOptions"></datalist>
          </label>
          <button class="icon-button" id="resetFilters" type="button" title="Reset filters" aria-label="Reset filters">
            ×
          </button>
        </section>

        <section class="overview-grid" aria-label="Training charts">
          <div class="panel">
            <div class="panel-heading">
              <h2>Body Part Distribution</h2>
              <span id="bodyPartTotal">0 sets</span>
            </div>
            <div class="bar-list" id="bodyPartChart"></div>
          </div>
          <div class="panel">
            <div class="panel-heading">
              <h2>Monthly Volume</h2>
              <span id="monthTotal">0 sets</span>
            </div>
            <div class="bar-list compact" id="monthChart"></div>
          </div>
          <div class="panel">
            <div class="panel-heading">
              <h2>Frequent Exercises</h2>
              <span id="exerciseTotal">0 exercises</span>
            </div>
            <div class="rank-list" id="topExercises"></div>
          </div>
        </section>

        <section class="panel table-panel" aria-label="Training details">
          <div class="panel-heading">
            <h2>Training Details</h2>
            <span id="visibleRows">0 records</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Body part</th>
                  <th>Exercise</th>
                  <th>Sets</th>
                  <th>Reps/set</th>
                  <th>Weight</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="logRows"></tbody>
            </table>
            <div class="empty-state" id="emptyState" hidden>No matching training history</div>
          </div>
        </section>
      </section>
      <footer class="site-footer">
        <p>© <span id="copyrightYear">2026</span> Haiyan Kong</p>
      </footer>
    </main>
  </body>
</html>
